# Frontend Nginx config (for EC2 #2)
# File: /etc/nginx/sites-available/pbl6-frontend
# Domain: pbl6-fe.duckdns.org

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name pbl6-fe.duckdns.org;
    
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server - Frontend only
server {
    listen 443 ssl http2;
    server_name pbl6-fe.duckdns.org;
    
    # SSL certificates (will be added by certbot)
    ssl_certificate /etc/letsencrypt/live/pbl6-fe.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pbl6-fe.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    
    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # All requests go to Next.js frontend
    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}
